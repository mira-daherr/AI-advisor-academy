version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: academic-advisor-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=academic-advisor

  server:
    build: ./server
    container_name: academic-advisor-server
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/academic-advisor
      - NODE_ENV=production

  client:
    build: ./client
    container_name: academic-advisor-client
    ports:
      - "80:80"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:3000/api

volumes:
  mongo-data:
